<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- → "viewport-units" -->
    <title>Sample Page for Testing</title>
    <link rel="stylesheet" href="sample.css">
</head>
<body>
    <dialog id="myDialog">              <!-- → "dialog" -->
        <p>This is a dialog element</p>
        <button>Close</button>
    </dialog>

    <details>                           <!-- → "details" -->
        <summary>Click to expand</summary> <!-- → "details" (same feature) -->
        <p>Hidden content here</p>
    </details>

    <picture>                           <!-- → "picture" -->
        <source srcset="image.webp" type="image/webp"> <!-- → "srcset" + "webp" -->
        <img src="image.jpg" alt="Sample image" loading="lazy"> <!-- → "loading-lazy-attr" -->
    </picture>

    <form>
        <input type="date" name="birthday">     <!-- → "input-datetime" -->
        <input type="color" name="favcolor">    <!-- → "input-color" -->
        <input type="range" min="0" max="100">  <!-- → "input-range" + "form-validation" (min/max attrs) -->
    </form>

    <script src="sample.js"></script>
</body>
</html>
